<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InternHub — Internship Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #4F46E5;
        --primary-light: #EEF2FF;
        --primary-dark: #3730A3;
        --primary-glow: rgba(79,70,229,0.15);
        --secondary: #7C3AED;
        --success: #10B981;
        --success-light: #D1FAE5;
        --warning: #F59E0B;
        --warning-light: #FEF3C7;
        --danger: #EF4444;
        --danger-light: #FEE2E2;
        --info: #0EA5E9;
        --info-light: #E0F2FE;
        --sidebar: #1E1B4B;
        --sidebar-hover: rgba(255,255,255,0.07);
        --sidebar-active: rgba(79,70,229,0.25);
        --sidebar-border: rgba(255,255,255,0.06);
        --bg: #F8FAFF;
        --bg-card: #FFFFFF;
        --text-primary: #111827;
        --text-secondary: #6B7280;
        --text-muted: #9CA3AF;
        --border: #E5E7EB;
        --border-light: #F3F4F6;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
        --shadow: 0 1px 8px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
        --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
        --radius: 12px;
        --radius-sm: 8px;
        --radius-lg: 16px;
        --radius-xl: 24px;
        --font: 'Plus Jakarta Sans', sans-serif;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: var(--font);
        background: var(--bg);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        background: var(--sidebar);
        position: relative;
        overflow: hidden;
      }

      .sidebar::before {
        content: '';
        position: absolute;
        top: -80px; left: -80px;
        width: 240px; height: 240px;
        background: radial-gradient(circle, rgba(79,70,229,0.2) 0%, transparent 70%);
        pointer-events: none;
      }

      /* ── NAV ITEMS ── */
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: var(--radius-sm);
        color: rgba(255,255,255,0.5);
        font-weight: 500;
        font-size: 13.5px;
        transition: all 0.18s ease;
        cursor: pointer;
        margin-bottom: 2px;
        border: 1px solid transparent;
      }

      .nav-item:hover {
        background: var(--sidebar-hover);
        color: rgba(255,255,255,0.85);
      }

      .nav-item.active {
        background: var(--sidebar-active);
        color: white;
        border-color: rgba(79,70,229,0.4);
        font-weight: 600;
      }

      .nav-item.active svg { color: #818CF8; }

      /* ── CARDS ── */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      }

      .card:hover {
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      /* ── STAT CARDS ── */
      .stat-card {
        background: var(--bg-card);
        border-radius: var(--radius);
        padding: 20px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm);
        transition: all 0.2s ease;
        position: relative;
        overflow: hidden;
      }

      .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .stat-card .stat-icon {
        width: 42px; height: 42px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 14px;
      }

      .stat-card.indigo .stat-icon { background: var(--primary-light); color: var(--primary); }
      .stat-card.green .stat-icon { background: var(--success-light); color: var(--success); }
      .stat-card.amber .stat-icon { background: var(--warning-light); color: var(--warning); }
      .stat-card.red .stat-icon { background: var(--danger-light); color: var(--danger); }
      .stat-card.sky .stat-icon { background: var(--info-light); color: var(--info); }
      .stat-card.violet .stat-icon { background: #F5F3FF; color: var(--secondary); }

      .stat-card .stat-accent {
        position: absolute;
        top: 0; right: 0;
        width: 4px; height: 100%;
        border-radius: 0 var(--radius) var(--radius) 0;
      }

      .stat-card.indigo .stat-accent { background: var(--primary); }
      .stat-card.green .stat-accent { background: var(--success); }
      .stat-card.amber .stat-accent { background: var(--warning); }
      .stat-card.red .stat-accent { background: var(--danger); }
      .stat-card.sky .stat-accent { background: var(--info); }
      .stat-card.violet .stat-accent { background: var(--secondary); }

      /* ── BUTTONS ── */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: var(--radius-sm);
        font-weight: 600;
        font-size: 13.5px;
        font-family: var(--font);
        cursor: pointer;
        border: none;
        transition: all 0.18s ease;
        white-space: nowrap;
      }

      .btn:active { transform: scale(0.97); }

      .btn-primary {
        background: var(--primary);
        color: white;
        box-shadow: 0 2px 8px rgba(79,70,229,0.3);
      }
      .btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 14px rgba(79,70,229,0.4); transform: translateY(-1px); }

      .btn-success {
        background: var(--success);
        color: white;
        box-shadow: 0 2px 8px rgba(16,185,129,0.25);
      }
      .btn-success:hover { background: #059669; box-shadow: 0 4px 14px rgba(16,185,129,0.35); transform: translateY(-1px); }

      .btn-danger {
        background: var(--danger);
        color: white;
        box-shadow: 0 2px 8px rgba(239,68,68,0.25);
      }
      .btn-danger:hover { background: #DC2626; box-shadow: 0 4px 14px rgba(239,68,68,0.35); transform: translateY(-1px); }

      .btn-ghost {
        background: white;
        color: var(--text-secondary);
        border: 1.5px solid var(--border);
      }
      .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

      .btn-warning {
        background: var(--warning);
        color: white;
        box-shadow: 0 2px 8px rgba(245,158,11,0.25);
      }
      .btn-warning:hover { background: #D97706; transform: translateY(-1px); }

      /* ── BADGES ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11.5px;
        font-weight: 600;
        font-family: var(--font);
      }

      .badge-green { background: var(--success-light); color: #065F46; }
      .badge-yellow { background: var(--warning-light); color: #92400E; }
      .badge-red { background: var(--danger-light); color: #991B1B; }
      .badge-blue { background: var(--primary-light); color: #3730A3; }
      .badge-sky { background: var(--info-light); color: #0C4A6E; }
      .badge-gray { background: var(--border-light); color: #4B5563; }
      .badge-violet { background: #F5F3FF; color: #5B21B6; }

      /* ── INPUT ── */
      .input {
        width: 100%;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 14px;
        font-family: var(--font);
        color: var(--text-primary);
        background: white;
        transition: all 0.18s;
        outline: none;
      }
      .input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-glow);
      }
      .input::placeholder { color: var(--text-muted); }

      /* ── TABLE ── */
      .table-row { transition: background 0.12s; }
      .table-row:hover { background: #FAFBFF; }

      /* ── AVATAR ── */
      .avatar {
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-family: var(--font);
        flex-shrink: 0;
      }

      /* ── PAGE HEADER ── */
      .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
        flex-wrap: wrap;
        gap: 12px;
      }

      .page-title {
        font-size: 22px;
        font-weight: 800;
        color: var(--text-primary);
        letter-spacing: -0.3px;
      }

      .page-subtitle {
        font-size: 13.5px;
        color: var(--text-muted);
        margin-top: 2px;
        font-weight: 400;
      }

      /* ── SECTION HEADER ── */
      .section-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-light);
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
      }

      .section-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-primary);
      }

      /* ── EMPTY STATE ── */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px;
        text-align: center;
        color: var(--text-muted);
      }

      .empty-state .empty-icon {
        width: 64px; height: 64px;
        background: var(--border-light);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        color: var(--text-muted);
      }

      .empty-state p { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
      .empty-state span { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      .fade-up { animation: fadeUp 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }
      .fade-up-1 { animation: fadeUp 0.4s 0.04s cubic-bezier(0.4,0,0.2,1) both; }
      .fade-up-2 { animation: fadeUp 0.4s 0.08s cubic-bezier(0.4,0,0.2,1) both; }
      .fade-up-3 { animation: fadeUp 0.4s 0.12s cubic-bezier(0.4,0,0.2,1) both; }
      .fade-up-4 { animation: fadeUp 0.4s 0.16s cubic-bezier(0.4,0,0.2,1) both; }
      .fade-in { animation: fadeIn 0.35s ease forwards; }

      /* ── SPINNER ── */
      .spinner {
        width: 32px; height: 32px;
        border: 3px solid var(--border-light);
        border-top-color: var(--primary);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }

      /* ── SCROLLBAR ── */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 2px; }

      /* ── DIVIDER ── */
      .divider { height: 1px; background: var(--border-light); }

      /* ── MESSAGE ── */
      .msg-success {
        padding: 12px 16px; border-radius: var(--radius-sm);
        background: var(--success-light);
        border: 1px solid #A7F3D0;
        color: #065F46;
        font-size: 13.5px; font-weight: 500;
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 20px;
      }
      .msg-error {
        padding: 12px 16px; border-radius: var(--radius-sm);
        background: var(--danger-light);
        border: 1px solid #FECACA;
        color: #991B1B;
        font-size: 13.5px; font-weight: 500;
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 20px;
      }

      /* ── PROGRESS BAR ── */
      .progress-bar {
        height: 6px;
        background: var(--border-light);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        border-radius: 3px;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        transition: width 0.6s ease;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 768px) {
        .sidebar-desktop { display: none !important; }
        .main-content { margin-left: 0 !important; padding: 16px !important; padding-top: 72px !important; }
        .stats-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
        .two-col { grid-template-columns: 1fr !important; }
        .three-col { grid-template-columns: 1fr !important; }
        .hide-mobile { display: none !important; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .mobile-full { width: 100% !important; }
        .action-row { flex-direction: column !important; }
        .page-header { flex-direction: column !important; align-items: flex-start !important; }
      }

      @media (min-width: 769px) {
        .mobile-header { display: none !important; }
        .mobile-menu { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
